<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Fondo oscuro -->
  <rect width="800" height="450" fill="#080808"/>

  <!-- Luces de escenario / ambiente nocturno -->
  <ellipse cx="200" cy="0" rx="180" ry="120" fill="#A6FF00" opacity="0.06"/>
  <ellipse cx="600" cy="0" rx="160" ry="100" fill="#A6FF00" opacity="0.04"/>
  <ellipse cx="400" cy="450" rx="300" ry="140" fill="#1a1a00" opacity="0.8"/>

  <!-- Silueta de multitud (barras verticales que simulan personas) -->
  <g opacity="0.35" fill="#222">
    <rect x="30"  y="300" width="18" height="150" rx="9"/>
    <rect x="60"  y="280" width="22" height="170" rx="11"/>
    <rect x="95"  y="310" width="16" height="140" rx="8"/>
    <rect x="125" y="270" width="24" height="180" rx="12"/>
    <rect x="162" y="295" width="18" height="155" rx="9"/>
    <rect x="195" y="265" width="20" height="185" rx="10"/>
    <rect x="228" y="305" width="16" height="145" rx="8"/>
    <rect x="258" y="278" width="22" height="172" rx="11"/>
    <rect x="294" y="290" width="19" height="160" rx="9"/>
    <rect x="328" y="260" width="25" height="190" rx="12"/>
    <rect x="368" y="300" width="17" height="150" rx="8"/>
    <rect x="400" y="272" width="21" height="178" rx="10"/>
    <rect x="436" y="288" width="19" height="162" rx="9"/>
    <rect x="470" y="268" width="23" height="182" rx="11"/>
    <rect x="508" y="298" width="17" height="152" rx="8"/>
    <rect x="540" y="275" width="21" height="175" rx="10"/>
    <rect x="576" y="285" width="18" height="165" rx="9"/>
    <rect x="608" y="260" width="24" height="190" rx="12"/>
    <rect x="648" y="295" width="16" height="155" rx="8"/>
    <rect x="678" y="278" width="22" height="172" rx="11"/>
    <rect x="715" y="308" width="18" height="142" rx="9"/>
    <rect x="748" y="268" width="20" height="182" rx="10"/>
  </g>

  <!-- Rayos de luz escenario -->
  <line x1="400" y1="0"   x2="100" y2="320" stroke="#A6FF00" stroke-width="1" opacity="0.08"/>
  <line x1="400" y1="0"   x2="250" y2="350" stroke="#A6FF00" stroke-width="1" opacity="0.06"/>
  <line x1="400" y1="0"   x2="400" y2="360" stroke="#A6FF00" stroke-width="1.5" opacity="0.1"/>
  <line x1="400" y1="0"   x2="550" y2="350" stroke="#A6FF00" stroke-width="1" opacity="0.06"/>
  <line x1="400" y1="0"   x2="700" y2="320" stroke="#A6FF00" stroke-width="1" opacity="0.08"/>

  <!-- Glow central escenario -->
  <ellipse cx="400" cy="280" rx="120" ry="30" fill="#A6FF00" opacity="0.05"/>

  <!-- Texto descriptivo central -->
  <text x="400" y="200" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="white" opacity="0.08" letter-spacing="8">MADRID</text>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="14" fill="white" opacity="0.06" letter-spacing="4">NIGHTLIFE &amp; HOSPITALITY</text>
</svg>
